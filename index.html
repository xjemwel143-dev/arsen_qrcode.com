<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link to QR Code Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: #16213e; padding: 40px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); text-align: center; width: 420px; }
        h1 { font-size: 1.6rem; margin-bottom: 8px; color: #e94560; }
        p.subtitle { color: #8892b0; margin-bottom: 24px; font-size: 0.9rem; }
        input[type="text"] { width: 100%; padding: 14px 16px; border: 2px solid #0f3460; border-radius: 8px; background: #1a1a2e; color: #eee; font-size: 1rem; outline: none; transition: border-color 0.3s; }
        input[type="text"]:focus { border-color: #e94560; }
        input[type="text"]::placeholder { color: #555; }
        button { margin-top: 16px; width: 100%; padding: 14px; background: #e94560; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.3s, transform 0.1s; }
        button:hover { background: #c73652; }
        button:active { transform: scale(0.98); }
        #qr-output { margin-top: 28px; display: none; flex-direction: column; align-items: center; gap: 14px; }
        #qr-output img, #qr-output canvas { border-radius: 12px; background: #fff; padding: 12px; box-shadow: 0 8px 30px rgba(233,69,96,0.2); }
        .download-btn { margin-top: 14px; display: inline-block; padding: 10px 24px; background: #0f3460; color: #eee; border-radius: 8px; text-decoration: none; font-size: 0.9rem; transition: background 0.3s; }
        .download-btn:hover { background: #1a5276; }
        .error { color: #e94560; margin-top: 12px; display: none; }
        .footer { margin-top: 28px; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ruth Generating QR-CODE </h1>
        <p class="subtitle">Paste any URL and get a scannable QR code instantly</p>
        <input type="text" id="linkInput" placeholder="https://example.com" autofocus>
        <button onclick="generateQR()">Generate QR Code</button>
        <div id="qr-output"></div>
        <p class="error" id="error-msg">Please enter a valid URL.</p>
        <p class="footer">Developed by Arsenio Bango Jr. &copy; 2026</p>
    </div>

    <script src="qrcode.min.js"></script>
    <script>
        var input = document.getElementById('linkInput');
        input.addEventListener('keydown', function(e) { if (e.key === 'Enter') generateQR(); });

        function generateQR() {
            var url = input.value.trim();
            var output = document.getElementById('qr-output');
            var error = document.getElementById('error-msg');

            if (!url) { error.style.display = 'block'; output.style.display = 'none'; return; }
            error.style.display = 'none';

            output.innerHTML = '';

            var qr = new QRCode(output, {
                text: url,
                width: 256,
                height: 256,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            output.style.display = 'flex';
        }
    </script>
</body>
</html>
